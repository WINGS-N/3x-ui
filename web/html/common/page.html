{{ define "page/head_start" }}
<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="renderer" content="webkit">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex,nofollow">
  <link rel="stylesheet" href="{{ .base_path }}assets/ant-design-vue/antd.min.css">
  <link rel="stylesheet" href="{{ .base_path }}assets/css/custom.min.css?{{ .cur_ver }}">
  <style>
    [v-cloak] {
      display: none;
    }
    /* vazirmatn-regular - arabic_latin_latin-ext */
    @font-face {
      font-display: swap;
      font-family: 'Vazirmatn';
      font-style: normal;
      font-weight: 400;
      src: url('{{ .base_path }}assets/Vazirmatn-UI-NL-Regular.woff2') format('woff2');
      unicode-range: U+0600-06FF, U+200C-200E, U+2010-2011, U+204F, U+2E41, U+FB50-FDFF, U+FE80-FEFC, U+0030-0039;
    }
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Vazirmatn', 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
    }
    
    /* mobile touch scrolling for tabs */
    @media (max-width: 576px) {
      .ant-tabs-nav-container {
        overflow-x: auto !important;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
        overscroll-behavior-x: contain;
        white-space: nowrap;
        max-width: 100%;
        padding: 0 !important; /* Remove padding for arrows */
      }
      .ant-tabs-nav-wrap {
        overflow: visible !important;
        padding: 0 !important;
      }
      .ant-tabs-nav-scroll {
        overflow: visible !important;
        box-shadow: none !important;
      }
      .ant-tabs-nav {
         display: flex !important;
         transform: none !important; /* Disable JS transform */
         width: auto !important;
         margin: 0 !important;
      }
      .ant-tabs-tab-prev,
      .ant-tabs-tab-next {
        display: none !important; /* Hide arrows */
      }
      .ant-tabs-nav-container::-webkit-scrollbar {
        display: none;
      }
    }

    @media (max-width: 768px) {
      #content-layout {
        width: 100%;
        min-width: 0;
      }

      .ant-layout-content {
        min-width: 0;
        padding: 0 .25rem .75rem;
      }

      .ant-card-head-wrapper {
        align-items: flex-start;
        gap: 8px;
      }

      .ant-card-head-title,
      .ant-card-extra {
        min-width: 0;
        white-space: normal;
      }

      .ant-card-extra {
        margin-left: 0;
      }

      .ant-card-actions > li {
        min-width: 0;
      }

      .ant-card-actions .ant-space {
        justify-content: center;
      }

      .ant-modal {
        top: 8px;
        width: calc(100vw - 16px) !important;
        max-width: calc(100vw - 16px);
        margin: 8px auto;
        padding-bottom: 8px;
      }

      .ant-modal-body {
        max-height: calc(100dvh - 140px);
        overflow: auto;
      }

      .ant-form-item-label,
      .ant-form-item-control-wrapper {
        width: 100%;
      }

      .ant-form-inline .ant-form-item {
        display: block;
        margin-right: 0;
        margin-bottom: 8px;
      }

      .ant-input-group.ant-input-group-compact {
        display: flex;
      }

      .ant-input-group.ant-input-group-compact > * {
        flex: 1 1 auto;
        min-width: 0;
      }

      .ant-select-selection-selected-value,
      .ant-select-dropdown-menu-item {
        max-width: 100%;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .settings-page .ant-alert {
        float: none !important;
        width: 100% !important;
      }

      .settings-page .ant-input-group {
        display: flex;
      }

      .settings-page .ant-input-group-addon {
        flex: 0 0 auto;
        white-space: nowrap;
      }

      .settings-page .ant-input-group .ant-input {
        min-width: 0;
      }

      .inbounds-page .ant-col-sm-24 {
        margin: .5rem 0 !important;
      }

      .inbounds-page .ant-table:not(.ant-table-expanded-row .ant-table),
      .inbounds-page .ant-table .ant-table-content,
      .inbounds-page .ant-table-expanded-row .ant-table .ant-table-body {
        overflow-x: auto !important;
      }

      .inbounds-page .client-email {
        display: inline-block;
        max-width: calc(100vw - 180px);
        overflow: hidden;
        text-overflow: ellipsis;
        vertical-align: middle;
      }

      .inbounds-page .tr-table-box {
        justify-content: flex-start;
      }

      .inbounds-page .tr-table-rt,
      .inbounds-page .tr-table-lt {
        flex-basis: auto;
        min-width: 44px;
      }

      .inbounds-page .tr-table-bar {
        flex: 1 1 70px;
        min-width: 48px;
      }

      .inbounds-page ~ div #inbound-info-modal code {
        display: block;
        max-width: 100%;
        overflow-x: auto;
        white-space: pre-wrap;
        overflow-wrap: anywhere;
        word-break: break-word;
      }
    }
  </style>
  <title>{{ .host }} – {{ i18n .title}}</title>
{{ end }}

{{ define "page/head_end" }}
</head>
{{ end }}

{{ define "page/body_start" }}
<body>
  <div id="message"></div>
{{ end }}

{{ define "page/body_scripts" }}
<script src="{{ .base_path }}assets/vue/vue.min.js?{{ .cur_ver }}"></script>
<script src="{{ .base_path }}assets/moment/moment.min.js"></script>
<script src="{{ .base_path }}assets/ant-design-vue/antd.min.js"></script>
<script src="{{ .base_path }}assets/axios/axios.min.js?{{ .cur_ver }}"></script>
<script src="{{ .base_path }}assets/qs/qs.min.js"></script>
<script src="{{ .base_path }}assets/js/axios-init.js?{{ .cur_ver }}"></script>
<script src="{{ .base_path }}assets/js/util/index.js?{{ .cur_ver }}"></script>
<script>
  const basePath = '{{ .base_path }}';
  axios.defaults.baseURL = basePath;
</script>
<script src="{{ .base_path }}assets/js/websocket.js?{{ .cur_ver }}"></script>
{{ end }}
  
{{ define "page/body_end" }}
</body>
</html>
{{ end }}
