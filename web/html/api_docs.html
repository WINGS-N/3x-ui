<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <title>{{ .title_text }}</title>
  <style>
    html, body, #app {
      height: 100%;
      margin: 0;
    }

    body {
      background: #fff;
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <script src="https://cdn.jsdelivr.net/npm/@scalar/api-reference"></script>
  <script>
    Scalar.createApiReference('#app', {
      url: {{ printf "%q" .spec_url }},
      servers: [
        {
          url: {{ printf "%q" .server_url }},
          description: 'Current panel',
        },
      ],
      defaultHttpClient: {
        targetKey: 'js',
        clientKey: 'fetch',
      },
      persistAuth: true,
      theme: 'saturn',
    })
  </script>
</body>
</html>
