components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: API token
      description: "Pass the panel API token as `Authorization: Bearer <token>`."
    apiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
      description: Alternative header accepted by the implementation.

  parameters:
    InboundId:
      name: id
      in: path
      required: true
      schema:
        type: integer
        format: int64
    InboundIdAsString:
      name: id
      in: path
      required: true
      schema:
        type: string
      description: Inbound ID as used by the handler path parameter.
    Email:
      name: email
      in: path
      required: true
      schema:
        type: string
      description: Client email. URL-encode the value when needed.
    ClientId:
      name: clientId
      in: path
      required: true
      schema:
        type: string
      description: Protocol-specific client identifier. URL-encode when needed.
    PeerIndex:
      name: peerId
      in: path
      required: true
      schema:
        type: integer
      description: Zero-based WireGuard peer index.
    TokenId:
      name: id
      in: path
      required: true
      schema:
        type: integer
        format: int64

  responses:
    ApiEnvelopeResponse:
      description: |
        Standard JSON envelope used by most handlers.

        Important:
        - HTTP 200 does not guarantee that the operation succeeded.
        - Check the `success` field first.
        - When `success=false`, `msg` contains the human-readable failure reason and `obj` is usually `null`.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiEnvelope"
          examples:
            success:
              summary: Logical success
              value:
                success: true
                msg: Operation completed successfully
                obj: null
            logicalError:
              summary: Logical failure returned with HTTP 200
              value:
                success: false
                msg: Something went wrong (duplicate email: demo@example.com)
                obj: null
    AuthNotFoundResponse:
      description: |
        Returned when the request has no valid authenticated panel session and no valid API token.

        The panel intentionally responds with HTTP 404 and an empty body to avoid exposing the existence of API endpoints to unauthorized callers.
    ForbiddenDomainResponse:
      description: |
        Returned by the optional domain-validation middleware when the request host does not match the configured allowed domain.

        Response body is empty.

  schemas:
    ApiEnvelope:
      type: object
      required: [success]
      properties:
        success:
          type: boolean
          description: Logical result of the operation. Always inspect this field even for HTTP 200 responses.
        msg:
          type: string
          description: Human-readable status or error message. This text may be localized and is not a stable machine-readable error code.
        obj:
          nullable: true
          description: Endpoint-specific payload. On logical failures it is usually omitted or `null`.

    ApiLogicalErrorEnvelope:
      type: object
      required: [success, msg]
      properties:
        success:
          type: boolean
          enum: [false]
        msg:
          type: string
          description: Human-readable failure reason produced by the handler.
        obj:
          nullable: true
          description: Usually `null` on logical failure.
      example:
        success: false
        msg: Something went wrong (wireguard peer binding is required)
        obj: null

    GenericObject:
      type: object
      additionalProperties: true

    Inbound:
      type: object
      properties:
        id:
          type: integer
          format: int64
        up:
          type: integer
          format: int64
        down:
          type: integer
          format: int64
        total:
          type: integer
          format: int64
        allTime:
          type: integer
          format: int64
        remark:
          type: string
        enable:
          type: boolean
        expiryTime:
          type: integer
          format: int64
        trafficReset:
          type: string
        lastTrafficResetTime:
          type: integer
          format: int64
        clientStats:
          type: array
          items:
            $ref: "#/components/schemas/ClientTraffic"
        listen:
          type: string
        port:
          type: integer
        protocol:
          type: string
          enum:
            - vmess
            - vless
            - tunnel
            - http
            - trojan
            - shadowsocks
            - mixed
            - wireguard
            - vk-turn-proxy
        settings:
          type: string
          description: JSON string with protocol-specific inbound settings.
        streamSettings:
          type: string
          description: JSON string with stream settings.
        tag:
          type: string
        sniffing:
          type: string
          description: JSON string with sniffing settings.

    InboundWriteRequest:
      type: object
      required:
        - up
        - down
        - total
        - remark
        - enable
        - expiryTime
        - listen
        - port
        - protocol
        - settings
        - sniffing
      properties:
        up:
          type: integer
          format: int64
        down:
          type: integer
          format: int64
        total:
          type: integer
          format: int64
        remark:
          type: string
        enable:
          type: boolean
        expiryTime:
          type: integer
          format: int64
        trafficReset:
          type: string
        lastTrafficResetTime:
          type: integer
          format: int64
        listen:
          type: string
        port:
          type: integer
        protocol:
          type: string
        settings:
          type: string
          description: "JSON string for the inbound `settings` field."
        streamSettings:
          type: string
          description: "Optional JSON string for `streamSettings`."
        sniffing:
          type: string
          description: JSON string for sniffing settings.

    InboundImportRequest:
      type: object
      required: [data]
      properties:
        data:
          type: string
          description: Serialized inbound JSON string to import.

    ClientMutationRequest:
      type: object
      required: [id, settings]
      properties:
        id:
          type: integer
          format: int64
          description: Target inbound ID.
        settings:
          type: string
          description: "JSON string containing a `clients` array."

    PeerMutationRequest:
      type: object
      required: [id, settings]
      properties:
        id:
          type: integer
          format: int64
          description: Target inbound ID.
        settings:
          type: string
          description: "JSON string containing a `peers` array."

    UpdateClientTrafficRequest:
      type: object
      required: [upload, download]
      properties:
        upload:
          type: integer
          format: int64
        download:
          type: integer
          format: int64

    LogsRequest:
      type: object
      properties:
        level:
          type: string
        syslog:
          type: string
          description: Use `"true"` to read journalctl output instead of application logs.

    XrayLogsRequest:
      type: object
      properties:
        filter:
          type: string
        showDirect:
          type: string
          description: String boolean as used by the handler, for example `"true"` or `"false"`.
        showBlocked:
          type: string
        showProxy:
          type: string

    EchCertRequest:
      type: object
      required: [sni]
      properties:
        sni:
          type: string

    ClientTraffic:
      type: object
      properties:
        id:
          type: integer
          format: int64
        inboundId:
          type: integer
          format: int64
        enable:
          type: boolean
        email:
          type: string
        uuid:
          type: string
        subId:
          type: string
        up:
          type: integer
          format: int64
        down:
          type: integer
          format: int64
        allTime:
          type: integer
          format: int64
        expiryTime:
          type: integer
          format: int64
        total:
          type: integer
          format: int64
        reset:
          type: integer
        lastOnline:
          type: integer
          format: int64

    APIToken:
      type: object
      properties:
        id:
          type: integer
          format: int64
        userId:
          type: integer
          format: int64
        name:
          type: string
        preview:
          type: string
        lastUsedAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ApiTokenCreateRequest:
      type: object
      properties:
        name:
          type: string

    ApiTokenCreateResult:
      type: object
      properties:
        token:
          type: string
          description: Plain API token returned only at creation time.
        info:
          $ref: "#/components/schemas/APIToken"

    VKTurnProxyPeerBinding:
      type: object
      properties:
        inboundId:
          type: integer
          format: int64
        inboundRemark:
          type: string
        clientId:
          type: string
        clientEmail:
          type: string

    VKTurnProxyPeerOption:
      type: object
      properties:
        publicKey:
          type: string
        allowedIPs:
          type: array
          items:
            type: string
        bound:
          nullable: true
          allOf:
            - $ref: "#/components/schemas/VKTurnProxyPeerBinding"

    VKTurnProxyPeerOptionsResponse:
      type: object
      properties:
        wireguardInboundId:
          type: integer
          format: int64
        wireguardRemark:
          type: string
        peers:
          type: array
          items:
            $ref: "#/components/schemas/VKTurnProxyPeerOption"

    VKTurnProxyClientPeer:
      type: object
      properties:
        privateKey:
          type: string
        publicKey:
          type: string
        preSharedKey:
          type: string
        allowedIPs:
          type: array
          items:
            type: string
        keepAlive:
          type: integer

    VKTurnProxyClient:
      type: object
      required:
        - email
        - link
      properties:
        id:
          type: string
          description: Optional on create. When omitted, the panel generates a UUID.
        email:
          type: string
        enable:
          type: boolean
        comment:
          type: string
        limitIp:
          type: integer
        totalGB:
          type: integer
          format: int64
        expiryTime:
          type: integer
          format: int64
        tgId:
          type: integer
          format: int64
        subId:
          type: string
        reset:
          type: integer
        created_at:
          type: integer
          format: int64
        updated_at:
          type: integer
          format: int64
        link:
          type: string
          description: TURN link consumed by the client app.
        peerPublicKey:
          type: string
          description: Existing WireGuard peer public key to bind when `peerManaged=false`.
        peerManaged:
          type: boolean
          description: When true, the panel manages the WireGuard peer from the `peer` object.
        peer:
          nullable: true
          allOf:
            - $ref: "#/components/schemas/VKTurnProxyClientPeer"

    VKTurnProxyExportedClient:
      type: object
      properties:
        clientId:
          type: string
        email:
          type: string
        link:
          type: string
          description: "`wingsv://` import link for the client."

    VKTurnProxyClientCreateResult:
      type: object
      properties:
        clientId:
          type: string
        email:
          type: string
        link:
          type: string
          description: "`wingsv://` import link for the created client when export is available."

    VKTurnProxyClientEnableRequest:
      type: object
      required: [enable]
      properties:
        enable:
          type: boolean

    EnableStateResponse:
      type: object
      properties:
        enable:
          type: boolean

    ProcessStatusSummary:
      type: object
      properties:
        available:
          type: boolean
        total:
          type: integer
        enabled:
          type: integer
        running:
          type: integer
        state:
          type: string
          enum: [running, stop, error]
        errorMsg:
          type: string
        uptime:
          type: integer
          format: int64

    Status:
      type: object
      properties:
        cpu:
          type: number
          format: double
        cpuCores:
          type: integer
        logicalPro:
          type: integer
        cpuSpeedMhz:
          type: number
          format: double
        mem:
          $ref: "#/components/schemas/CurrentTotalStats"
        swap:
          $ref: "#/components/schemas/CurrentTotalStats"
        disk:
          $ref: "#/components/schemas/CurrentTotalStats"
        xray:
          type: object
          properties:
            state:
              type: string
              enum: [running, stop, error]
            errorMsg:
              type: string
            version:
              type: string
        vkTurnProxy:
          $ref: "#/components/schemas/ProcessStatusSummary"
        uptime:
          type: integer
          format: int64
        loads:
          type: array
          items:
            type: number
            format: double
        tcpCount:
          type: integer
        udpCount:
          type: integer
        netIO:
          type: object
          properties:
            up:
              type: integer
              format: int64
            down:
              type: integer
              format: int64
        netTraffic:
          type: object
          properties:
            sent:
              type: integer
              format: int64
            recv:
              type: integer
              format: int64
        publicIP:
          type: object
          properties:
            ipv4:
              type: string
            ipv6:
              type: string
        appStats:
          type: object
          properties:
            threads:
              type: integer
            mem:
              type: integer
              format: int64
            uptime:
              type: integer
              format: int64

    CurrentTotalStats:
      type: object
      properties:
        current:
          type: integer
          format: int64
        total:
          type: integer
          format: int64

    CPUHistoryPoint:
      type: object
      properties:
        t:
          type: integer
          format: int64
        cpu:
          type: number
          format: double

    LogEntry:
      type: object
      properties:
        DateTime:
          type: string
          format: date-time
        FromAddress:
          type: string
        ToAddress:
          type: string
        Inbound:
          type: string
        Outbound:
          type: string
        Email:
          type: string
        Event:
          type: integer
          description: 0=direct, 1=blocked, 2=proxied

    UuidResult:
      type: object
      properties:
        uuid:
          type: string

    X25519KeyPair:
      type: object
      properties:
        privateKey:
          type: string
        publicKey:
          type: string

    Mldsa65KeyPair:
      type: object
      properties:
        seed:
          type: string
        verify:
          type: string

    Mlkem768KeyPair:
      type: object
      properties:
        seed:
          type: string
        client:
          type: string

    EchCertResult:
      type: object
      properties:
        echServerKeys:
          type: string
        echConfigList:
          type: string

    VlessEncResponse:
      type: object
      properties:
        auths:
          type: array
          items:
            $ref: "#/components/schemas/VlessEncAuth"

    VlessEncAuth:
      type: object
      properties:
        label:
          type: string
        decryption:
          type: string
        encryption:
          type: string
