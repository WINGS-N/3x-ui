# Relaxes staticcheck for the release "analyze" gate against the upstream
# v3.3.1 tree. Inherits staticcheck's default check set and only subtracts the
# style / simplification / unused / deprecation warnings that the upstream code
# (and a few ported vk-turn-proxy helpers) trip; correctness checks stay on.
checks = ["inherit", "-ST1005", "-S1002", "-S1011", "-U1000", "-SA1019"]
